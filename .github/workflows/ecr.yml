name: ECR Repositories

on:
  workflow_dispatch:

jobs:
  create-repos:
    name: Create ECR Repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Ensure ECR repos exist
        run: |
          for manifest in deployments/*/prod/deployment.yaml; do
            service=$(echo "$manifest" | cut -d/ -f2)
            aws ecr describe-repositories --repository-names "voyager/${service}" 2>/dev/null || \
              aws ecr create-repository --repository-name "voyager/${service}"
            echo "voyager/${service} ready"
          done
