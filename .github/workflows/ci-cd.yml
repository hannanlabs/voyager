name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-go:
    name: Validate Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/shared-go/go.mod
      - run: go vet ./...
        working-directory: packages/shared-go
      - run: go build ./...
        working-directory: packages/shared-go
      - run: go test -v ./...
        working-directory: packages/shared-go
      - run: go vet ./...
        working-directory: apps/simulator
      - run: go build ./...
        working-directory: apps/simulator
      - run: go test -v ./...
        working-directory: apps/simulator

  validate-node:
    name: Validate Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm --filter frontend... build
