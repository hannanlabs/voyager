name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-go:
    name: Validate Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/shared-go/go.mod
      - run: go vet ./... && go build ./... && go test -v ./...
        working-directory: packages/shared-go
      - run: go vet ./... && go build ./... && go test -v ./...
        working-directory: apps/simulator

  validate-node:
    name: Validate Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm --filter frontend... build

  build-and-deploy:
    name: Build & Deploy
    needs: [validate-go, validate-node]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push images
        run: |
          R=${{ steps.ecr.outputs.registry }}
          T=${{ github.sha }}
          for app in frontend simulator; do
            docker build -t $R/voyager/$app:$T -f apps/$app/Dockerfile \
              --build-arg NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }} .
            docker push $R/voyager/$app:$T
          done
          for svc in otel-collector prometheus loki tempo grafana; do
            docker build -t $R/voyager/$svc:$T infrastructure/$svc
            docker push $R/voyager/$svc:$T
          done
      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name voyager --region us-east-1
          ECR="${{ steps.ecr.outputs.registry }}"
          TAG="${{ github.sha }}"
          for manifest in deployments/*/prod/deployment.yaml; do
            sed "s|PLACEHOLDER_ECR|${ECR}|g; s|PLACEHOLDER_TAG|${TAG}|g" \
              "$manifest" | kubectl apply -f -
          done
      - name: Verify rollout
        run: |
          for manifest in deployments/*/prod/deployment.yaml; do
            service=$(echo "$manifest" | cut -d/ -f2)
            kubectl rollout status deployment/${service} --timeout=120s
          done
