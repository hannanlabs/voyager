name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]


jobs:
  validate-shared-go:
    name: Validate Go Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/shared-go/go.mod

      - name: Format check
        working-directory: packages/shared-go
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        working-directory: packages/shared-go
        run: go vet ./...

      - name: Go build
        working-directory: packages/shared-go
        run: go build ./...

      - name: Go test
        working-directory: packages/shared-go
        run: go test -v ./...

  validate-simulator:
    name: Validate Simulator
    runs-on: ubuntu-latest
    needs: validate-shared-go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/simulator/go.sum

      - name: Format check
        working-directory: apps/simulator
        run: test -z "$(gofmt -l .)"

      - name: Go vet
        working-directory: apps/simulator
        run: go vet ./...

      - name: Go build
        working-directory: apps/simulator
        run: go build ./...

      - name: Go test
        working-directory: apps/simulator
        run: go test -v ./...

  validate-shared-ts:
    name: Validate TypeScript Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-ts
        run: pnpm --filter @voyager/shared-ts build

  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    needs: validate-shared-ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build shared-ts
        run: pnpm --filter @voyager/shared-ts build

      - name: Lint frontend
        run: pnpm --filter frontend lint

      - name: Format check frontend
        run: pnpm --filter frontend format

      - name: Type check frontend
        run: pnpm --filter frontend typecheck

      - name: Build frontend
        run: pnpm --filter frontend build

