name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-go:
    name: Validate Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/simulator/go.mod
      - run: go vet ./... && go build -o simulator ./cmd && go test -v ./...
        working-directory: apps/simulator

  validate-node:
    name: Validate Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install
        working-directory: apps/frontend
      - run: pnpm build
        working-directory: apps/frontend
